##
## Ganpi defaults
##

[system]
#en: Application-wide settings.
#ja: アプリケーション全体の設定。

#en: Whether to detect the file type when opening a file and set the language accordingly. (true|false)
#ja: ファイルを開く際にファイルタイプを検出してそれに合わせた言語設定にするか否か。(true|false)

.auto_detection.file_type                : true


[document]
#en: Per-document settings.
#ja: ドキュメント単位の設定。

#en: Window size settings for a new document. Specify width and height separately, in pixels.
#ja: 新規ドキュメントのウインドウサイズ設定。幅(width)と高さ(height)を個別に指定する。ピクセル単位。

.size.width                              : 600.0
.size.height                             : 600.0

#en: Set the newline code for new documents. (lf|cr|crlf)
#ja: 新規ドキュメントの改行コードを設定。(lf|cr|crlf)

.newline                                 : lf

#en: Set the character encoding for new documents. (utf8|utf16|utf32|sjis|jis|euc)
#ja: 新規ドキュメントの文字コードを設定。(utf8|utf16|utf32|sjis|jis|euc)

.character_code                          : utf8

#en: Set the file type for new documents.
#ja: 新規ドキュメントのファイルタイプを設定。
#    (plain|ruby|html|php|ini|sh|python|typescript|css|yaml|json|yamaha|cisco|log)

.file_type                               : plain

#en: Whether to show line numbers. (true|false)
#ja: 行番号を表示するか否か。 (true|false)

.show_line_number                        : true

#en: Whether to reject changing the display font by dropping font information onto the document. (true|false)
#ja: ドキュメントへのフォント情報のドロップで表示フォントの変更を拒否するか否か。(true|false)

.reject_font_change                      : false


[editor]
#en: Set the key bindings. (ganpi|vi|emacs|system)
#en: "system" uses the OS standard key bindings, which are close to emacs. However, it does not include multi-stroke bindings.
#ja: キーアサインを設定。(ganpi|vi|emacs|system)
#ja: systemはOS標準のキーアサインでemacsに近い。ただし2ストローク以上のアサインはない。

.key_assign                              : ganpi

#en: Whether to use edit mode (normal/edit mode switching feature). (true|false)
#ja: edit mode (normal/editモード切替機能)を利用するか否か。(true|false)

.use_edit_mode                           : true

#en: Which mode to start edit mode (edit-only mode) in. (normal|edit)
#en: If you prefer a vi-like style, selecting edit will feel more natural.
#en: (In Ganpi, the text input state is called normal, and the editing-only mode is called edit.)
#ja: edit mode (編集専用モード)をどのモードで開始するか。(normal|edit)
#ja: vi風が好みの場合にはeditを選択した方が自然。
#ja: (ganpiでは文字入力状態をnormal、編集のみのモードをeditと呼称する。)

.edit_mode                               : normal

#en: Whether to use yank pop. (true|false)
#en: Yank pop is a feature that inserts previous copy history entries after a paste (yank) operation when given the corresponding command.
#ja: yank pop を利用するか否か。(true|false)
#ja: yank popはpaste(yank)動作後に所定の指示を出すとcopyの履歴を辿って挿入する機能。

.use_yank_pop                            : true

#en: Whether to use word completion. (true|false)
#ja: 語彙補完を利用するか否か。(true|false)

.use_word_completion                     : true

#en: Whether to show a candidate menu during word completion. (true|false)
#ja: 語彙補完の際に候補語彙のメニューを出すか否か。(true|false)

.show_completion_menu                    : true


[search_window]
#en: Search panel settings.
#ja: 検索パネルの設定。

#en: Specify the font size and font family for the search string.
#en: Font size is in pt units. Write it like 12.0.
#en: The font family must be specified exactly.
#en: Selecting from the panel shown by the menu "Option/Show Font Panel..." inserts the value. (Delete the size part if needed.)
#ja: 検索文字列のフォントサイズ・フォントファミリーを指定する。
#ja: フォントサイズはpt単位。12.0 のように記述する。
#ja: フォントファミリーは正確な記述が必要。
#ja: メニュー「Option/Show Font Panel...」で表示されるパネルから選択すると挿入される。(サイズは削除で)

.search_field.font.size                  : 14.0
.search_field.font.family                : ?

#en: Specify the font size and font family for the replacement string.
#ja: 置換文字列のフォントサイズ・フォントファミリーを指定する。

.replace_field.font.size                 : 14.0
.replace_field.font.family               : ?

#en: Whether to hide the panel after pressing the "Search" button. (true|false)
#ja: 「Search」ボタンを押下後にパネルを隠すか否か。(true|false)

.close_when_done                         : true


[color_panel]
#en: Color panel settings.
#ja: カラーパネルの設定。

#en: Whether to show alpha. (true|false)
#en: When opening the color panel, holding down the Option key reverses this setting.
#ja: アルファを表示するか否か。(true|false)
#ja: カラーパネルを呼び出す際に、optionキーを押下しておくと設定と逆の表示になる。

.with_alpha                              : false


[parser.base]
#en: Common settings shared by all syntax modes.
#en: Overridden by individual settings where applicable.
#ja: シンタックスモード全体の共通設定。
#ja: 個別の設定によって上書きされる。

#en: Set the tab width. (integer)
#en: Specifies how many times the width of a space character should be used to display consecutive leading tabs.
#ja: タブ幅を設定。(整数)
#ja: 文頭の連続するタブについて、空白文字の何倍の幅で表示するか指定する。

.tab_width                               : 4

#en: Set the line spacing. (float)
#ja: 行間を設定。(float)

.line_spacing                            : 2.0

#en: Whether to wrap lines. (true|false)
#ja: 行の折り返しをするか否か。(true|false)

.word_wrap                               : true

#en: Whether to use auto-indent. (true|false)
#ja: オートインデントをするか否か。(true|false)

.auto_indent                             : true

#en: Whether to show functional characters (invisible characters). (true|false)
#ja: 機能文字(不可視文字)を表示するか否か。(true|false)

.show.invisibles                         : false

#en: Set where wrapped lines should start.
#ja: 折り返し行の開始位置をどこにするか設定。
#    (none|same|1tab|1.5tab|2tab)

.wrapline_offset                         : same

#en: Whether to use spaces instead of tabs for indentation. (true|false)
#ja: インデントの際にタブではなく空白文字を使用するか否か。(true|false)

.indent_using_spaces                     : true

#en: For each functional character (invisible character), whether to show it. (true|false)
#en: Applied only when .show.invisibles is true.
#ja: 機能文字(不可視文字)それぞれについて、表示するか否か。(true|false)
#ja: .show.invisiblesがtrueの場合に反映される。

.show.invisibles.tab                     : true
.show.invisibles.newline                 : true
.show.invisibles.space                   : true
.show.invisibles.fullwidth_space         : true

#en: Functional characters (invisible characters)
#ja: 機能文字(不可視文字)
#    ⏎ ➤ ∙ □

.invisibles.glyph.newline                : ⏎
.invisibles.glyph.tab                    : ➤
.invisibles.glyph.space                  : ∙
.invisibles.glyph.fullwidth_space        : □

#en: Color settings for syntax modes.
#en: Specify separately for macOS Light and Dark appearance modes.
#en: .text: base text, .background: background
#en: .literal: literals such as quotes and regular expressions, .comment: comments
#en: .variable: variables, .keyword: keywords, .numeric: numbers
#en: .tag: tags such as in HTML
#en: .invisibles: functional characters (invisible characters), .completion: completion segment shown by the completion feature
#en: .selection_highlight.active: selection highlight (active)
#en: .selection_highlight.inactive: selection highlight (inactive)
#ja: シンタックスモードの色指定。
#ja: macOSの外観モードのLightとDarkのそれぞれについて指定する。
#ja: .text: ベース文字, .background: 背景
#ja: .literal: クオート・正規表現などのリテラル, .comment: コメント
#ja: .variable: 変数, .keyword: キーワード, .numeric: 数値
#ja: .tag: HTMLなどのタグ
#ja: .invisibles: 機能文字(不可視文字), completion: 補完機能の補完部分
#ja: .selection_highlight.active: 選択部分(アクティブ)
#ja: .selection_highlight.inactive: 選択部分(インアクティブ)

#en: Light (unnamed)
#ja: Light (無銘)

.color.text                              : #1E1E1E
.color.background                        : #FAFAFA
.color.literal                           : #860300
.color.comment                           : #0B5A00
.color.variable                          : #653F00
.color.keyword                           : #070093
.color.numeric                           : #873000
.color.tag                               : #6A6AD4
.color.invisibles                        : #CCCCCC
.color.completion                        : #CCCCCC
.color.selection_highlight.active        : #CCE0FF
.color.selection_highlight.inactive      : #E5E5E5


#en: Dark (recommended color scheme)
#ja: Dark (推奨配色)

.color.text.dark                         : #E6E6E6
.color.background.dark                   : #1E1E1E
.color.literal.dark                      : #FF8660
.color.comment.dark                      : #00A34A
.color.variable.dark                     : #E0A050
.color.keyword.dark                      : #85A4FF
.color.numeric.dark                      : #E0A050
.color.tag.dark                          : #6A6AD4
.color.invisibles.dark                   : #555555
.color.completion.dark                   : #777777
.color.selection_highlight.active.dark   : #204080
.color.selection_highlight.inactive.dark : #303030

# Font
#en: Font size and font family used consistently throughout the document.
#ja: 文書全体で共通して使われるフォントサイズとフォントファミリー

.font.family                             : ?
.font.size                               : 14.0


[parser.html]
#en: Settings specific only to HTML syntax.
#ja: HTMLシンタックス用のみ個別に指定。

.color.keyword                           : #070093
.color.literal                           : #010C7E
.color.numeric                           : #873000
.color.comment                           : #A20000
.color.tag                               : #6A6AD4

.color.keyword.dark                      : #85A4FF
.color.literal.dark                      : #85A4FF
.color.numeric.dark                      : #E0A050
.color.comment.dark                      : #FF6B6B
.color.tag.dark                          : #6A6AD4

